# Render Blueprint - AI Board Backend API
# Deploy this to Render to host the backend API

services:
  - type: web
    name: ai-board-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r api_requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
